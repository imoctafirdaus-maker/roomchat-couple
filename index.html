<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Couple - Okta & Novi</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --wa-green: #075e54;
            --wa-light-green: #dcf8c6;
            --wa-blue: #34b7f1;
            --bg-chat: #e5ddd5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-chat);
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background-color: var(--wa-green);
            color: white;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .profile-container { position: relative; }
        .profile-pic {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: #eee url('https://i.pravatar.cc/100?img=26') center/cover;
        }
        
        /* Status Online Dot */
        .online-dot {
            width: 12px; height: 12px;
            background-color: #4df03d;
            border: 2px solid var(--wa-green);
            border-radius: 50%;
            position: absolute;
            bottom: 2px; right: 0;
        }

        .user-info h4 { font-size: 16px; font-weight: 600; }
        .user-info span { font-size: 12px; opacity: 0.9; }

        /* Chat Container */
        .chat-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            position: relative;
            max-width: 75%;
            padding: 6px 10px 20px 10px;
            margin-bottom: 8px;
            font-size: 14.5px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        /* Bubble Style */
        .received {
            background: white;
            align-self: flex-start;
            border-radius: 0 8px 8px 8px;
        }

        .sent {
            background: var(--wa-light-green);
            align-self: flex-end;
            border-radius: 8px 0 8px 8px;
        }

        /* Meta Data (Jam & Centang) */
        .msg-meta {
            position: absolute;
            right: 8px;
            bottom: 3px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .time { font-size: 10px; color: #888; }
        
        .status-icon {
            display: flex;
            align-items: center;
        }

        /* Input Area */
        .input-area {
            background: #f0f0f0;
            padding: 8px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-box {
            background: white;
            flex: 1;
            border-radius: 25px;
            padding: 5px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input {
            border: none; flex: 1;
            padding: 8px 0; outline: none;
            font-size: 15px;
        }

        .icon-btn { color: #54656f; cursor: pointer; border: none; background: none; }

        .circle-btn {
            background: #008069;
            color: white;
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div class="header">
        <div class="profile-container">
            <div class="profile-pic"></div>
            <div class="online-dot"></div>
        </div>
        <div class="user-info">
            <h4>Novi ❤️</h4>
            <span>Online</span>
        </div>
    </div>

    <div class="chat-container" id="chat-box">
        <div class="message received">
            Halo Okta! Sudah kirim tugasnya?
            <div class="msg-meta">
                <span class="time">14:00</span>
            </div>
        </div>

        <div class="message sent">
            Belum nih, masih edit video dikit.
            <div class="msg-meta">
                <span class="time">14:02</span>
                <div class="status-icon">
                    <i data-lucide="check" size="14" color="#888"></i>
                </div>
            </div>
        </div>

        <div class="message sent">
            Tunggu ya, maksimal 30 detik kan?
            <div class="msg-meta">
                <span class="time">14:05</span>
                <div class="status-icon">
                    <i data-lucide="check-check" size="14" color="#34b7f1"></i>
                </div>
            </div>
        </div>

        <div class="message received" style="background:none; box-shadow:none;">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHY5Mnh6Znd6ZWZ6ZWZ6ZWZ6ZWZ6ZWZ6ZWZ6ZWZ6ZWZ6ZWZ6ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/3o7TKMGpxx6B8Z1o64/giphy.gif" width="100" alt="stiker">
            <div class="msg-meta">
                <span class="time">14:06</span>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <button class="icon-btn"><i data-lucide="smile"></i></button>
            <input type="text" id="msg-input" placeholder="Ketik pesan">
            <button class="icon-btn"><i data-lucide="paperclip"></i></button>
            <button class="icon-btn"><i data-lucide="camera"></i></button>
        </div>
        
        <button class="circle-btn" id="main-btn">
            <i data-lucide="mic"></i>
        </button>
    </div>

    <script>
        lucide.createIcons();

        const input = document.getElementById('msg-input');
        const btn = document.getElementById('main-btn');

        // Ganti ikon mic jadi send saat ada teks
        input.addEventListener('input', () => {
            if(input.value.trim() !== "") {
                btn.innerHTML = '<i data-lucide="send-horizontal"></i>';
            } else {
                btn.innerHTML = '<i data-lucide="mic"></i>';
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
