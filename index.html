<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#075e54">
    <title>WhatsApp Couple Pro</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --wa-green: #075e54; --wa-light-green: #dcf8c6; --wa-blue: #34b7f1; --bg-chat: #e5ddd5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; background: #fff; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .user-item { padding: 15px; border: 1px solid #ddd; border-radius: 12px; width: 280px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .user-item:active { background: #f0f0f0; }
        
        #app-interface { display: none; height: 100%; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: contain; }
        
        .header { background: var(--wa-green); color: white; padding: 10px 16px; display: flex; align-items: center; gap: 12px; height: 60px; z-index: 100; position: relative; }
        .profile-pic { width: 40px; height: 40px; border-radius: 50%; background: #ccc center/cover; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.2); }
        .profile-pic.zoom { position: fixed; top: 20%; left: 10%; width: 80vw; height: 80vw; border-radius: 10px; z-index: 1000; box-shadow: 0 0 100px rgba(0,0,0,0.5); }
        
        .chat-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .message { position: relative; max-width: 80%; padding: 6px 10px 18px 10px; margin-bottom: 8px; font-size: 15px; border-radius: 8px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; cursor: pointer; }
        .received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .sent { background: var(--wa-light-green); align-self: flex-end; border-top-right-radius: 0; }
        
        .meta { position: absolute; right: 5px; bottom: 2px; display: flex; align-items: center; gap: 3px; }
        .time { font-size: 10px; color: #888; }
        
        .input-area { background: #f0f0f0; padding: 8px; display: flex; align-items: center; gap: 5px; position: relative; z-index: 10; }
        .input-box { background: white; flex: 1; border-radius: 25px; padding: 5px 12px; display: flex; align-items: center; gap: 10px; }
        input { border: none; flex: 1; padding: 8px 0; outline: none; font-size: 16px; background: transparent; }
        
        .circle-btn { background: #008069; color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }
        
        #emoji-panel { display: none; background: white; height: 280px; overflow-y: auto; border-top: 1px solid #ddd; }
        .tab-bar { display: flex; background: #f0f0f0; padding: 5px; border-bottom: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 8px; text-align: center; cursor: pointer; font-size: 14px; font-weight: bold; border-radius: 5px; }
        .tab-active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grid-content { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 15px; }
        .sticker-grid { grid-template-columns: repeat(4, 1fr); }
        .emoji-item { font-size: 26px; text-align: center; cursor: pointer; padding: 5px; }
        .sticker-item { width: 100%; aspect-ratio: 1/1; object-fit: cover; cursor: pointer; border-radius: 5px; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 500; }
        .menu-dropdown { display: none; position: absolute; top: 50px; right: 10px; background: white; color: black; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); padding: 5px; z-index: 1001; min-width: 160px; }
        .menu-item { padding: 12px 15px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 10px; border-radius: 5px; }

        audio.vn-msg { height: 35px; width: 200px; margin-top: 5px; }
        .sticker-msg { width: 130px; height: 130px; display: block; }
    </style>
</head>
<body onclick="activateAudio()">

    <audio id="notif-sound" src="https://raw.githubusercontent.com/Aris-Agustiyan/whatsapp-clone/master/src/assets/sounds/whatsapp_notification.mp3" preload="auto"></audio>
    <div class="overlay" id="overlay" onclick="closeZoom()"></div>

    <div id="login-screen">
        <h3 style="margin-bottom:30px; color:#54656f;">Siapa Anda?</h3>
        <div class="user-item" onclick="loginAs('Okta')">
            <div style="width:40px; height:40px; border-radius:50%; background:#075e54; color:white; display:flex; align-items:center; justify-content:center;">O</div>
            <b>Okta Firdaus</b>
        </div>
        <div class="user-item" onclick="loginAs('Novi')">
            <div style="width:40px; height:40px; border-radius:50%; background:#e11d48; color:white; display:flex; align-items:center; justify-content:center;">N</div>
            <b>Novi</b>
        </div>
    </div>

    <div id="app-interface">
        <div class="header">
            <div class="profile-pic" id="header-pic" onclick="zoomPic()"></div>
            <div style="flex:1">
                <h4 id="header-name">Partner</h4>
                <span id="header-status" style="font-size:11px; opacity:0.9">Offline</span>
            </div>
            <i data-lucide="rotate-cw" style="cursor:pointer; margin-right: 15px; width: 20px;" onclick="location.reload()"></i>
            <i data-lucide="more-vertical" style="cursor:pointer" onclick="toggleMenu(event)"></i>
            
            <div class="menu-dropdown" id="menu-dropdown">
                <div class="menu-item" onclick="document.getElementById('profile-input').click()"><i data-lucide="image"></i> Ganti Profil</div>
                <div class="menu-item" onclick="document.getElementById('sticker-upload').click()"><i data-lucide="smile-plus"></i> Tambah Stiker</div>
                <hr style="border:0; border-top:1px solid #eee; margin:5px 0">
                <div class="menu-item" onclick="logout()" style="color:red"><i data-lucide="log-out"></i> Logout</div>
                <input type="file" id="profile-input" hidden accept="image/*" onchange="updateProfilePic(this)">
                <input type="file" id="sticker-upload" hidden accept="image/*" onchange="uploadSticker(this)">
            </div>
        </div>

        <div class="chat-container" id="chat-box" onclick="closePanels()"></div>

        <div id="emoji-panel">
            <div class="tab-bar">
                <div class="tab-btn tab-active" id="tab-emoji" onclick="switchTab('emoji')">Emoji</div>
                <div class="tab-btn" id="tab-sticker" onclick="switchTab('sticker')">Stiker</div>
            </div>
            <div id="emoji-content" class="grid-content"></div>
            <div id="sticker-content" class="grid-content sticker-grid" style="display:none"></div>
        </div>

        <div class="input-area">
            <div class="input-box">
                <i data-lucide="smile" onclick="toggleEmoji()" style="cursor:pointer"></i>
                <input type="text" id="msg-input" placeholder="Ketik pesan..." oninput="toggleBtn()" onfocus="closePanels()">
                <label for="file-input"><i data-lucide="paperclip" style="cursor:pointer"></i></label>
                <input type="file" id="file-input" hidden accept="image/*" onchange="handleImage(this)">
            </div>
            <button class="circle-btn" id="action-btn" onmousedown="startRecording()" onmouseup="stopRecording()" ontouchstart="startRecording()" ontouchend="stopRecording()" onclick="handleAction()">
                <i data-lucide="mic" id="btn-icon"></i>
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAH7DAAnW10vhlf9Fb4FNS--Djq67KUTA0",
          authDomain: "couple-chat-okta-dan-novi.firebaseapp.com",
          databaseURL: "https://couple-chat-okta-dan-novi-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "couple-chat-okta-dan-novi",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = "";
        let isFirstLoad = true;
        let mediaRecorder;
        let audioChunks = [];
        const audio = document.getElementById('notif-sound');

        function activateAudio() { audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {}); document.body.removeAttribute('onclick'); }
        function getTime() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

        // AUTO-LOGIN SAAT REFRESH
        window.onload = () => {
            const savedUser = localStorage.getItem('logged_user_oknov');
            if(savedUser) {
                currentUser = savedUser;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-interface').style.display = 'flex';
                startApp();
            }
        };

        function loginAs(name) {
            const pin = prompt(`PIN ${name}:`);
            const pins = { 'Okta': '14102000', 'Novi': '14112001' };
            if (pin === pins[name]) {
                currentUser = name;
                localStorage.setItem('logged_user_oknov', name); 
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-interface').style.display = 'flex';
                startApp();
            } else { alert("PIN Salah!"); }
        }

        function logout() {
            if(currentUser) db.ref(`profiles/${currentUser}`).update({ status: `Terakhir dilihat ${getTime()}` });
            localStorage.removeItem('logged_user_oknov');
            location.reload();
        }

        function startApp() {
            lucide.createIcons();
            initEmoji();
            initStickers();
            const partner = currentUser === "Okta" ? "Novi" : "Okta";
            
            db.ref(`profiles/${currentUser}`).update({ status: "Online" });
            db.ref(`profiles/${currentUser}`).onDisconnect().update({ status: `Terakhir dilihat ${getTime()}` });

            db.ref(`profiles/${partner}`).on('value', s => {
                const d = s.val() || {};
                document.getElementById('header-status').innerText = d.status || "Offline";
                document.getElementById('header-name').innerText = partner;
                if(d.pic) document.getElementById('header-pic').style.backgroundImage = `url(${d.pic})`;
            });

            db.ref('chats').on('value', s => {
                const box = document.getElementById('chat-box');
                const data = s.val();
                box.innerHTML = "";
                if(data) {
                    Object.keys(data).forEach(key => {
                        const m = data[key];
                        const div = document.createElement('div');
                        div.className = `message ${m.sender === currentUser ? 'sent' : 'received'}`;
                        
                        // FITUR HAPUS: Hold 1 detik
                        div.oncontextmenu = (e) => { e.preventDefault(); confirmDelete(key); };
                        let timer;
                        div.ontouchstart = () => timer = setTimeout(() => confirmDelete(key), 800);
                        div.ontouchend = () => clearTimeout(timer);

                        let content = `<span>${m.content}</span>`;
                        if(m.type === 'image') content = `<img src="${m.content}" style="width:100%; border-radius:8px;">`;
                        if(m.type === 'vn') content = `<audio controls class="vn-msg"><source src="${m.content}"></audio>`;
                        if(m.type === 'sticker') content = `<img src="${m.content}" class="sticker-msg">`;

                        const status = m.read ? `<i data-lucide="check-check" style="color:var(--wa-blue); width:14px;"></i>` : `<i data-lucide="check" style="color:#888; width:14px;"></i>`;
                        div.innerHTML = `${content}<div class="meta"><span class="time">${m.time}</span>${m.sender === currentUser ? status : ''}</div>`;
                        box.appendChild(div);
                        if(m.sender !== currentUser && !m.read) db.ref(`chats/${key}`).update({ read: true });
                    });
                    if (!isFirstLoad) {
                        const keys = Object.keys(data);
                        if(data[keys[keys.length-1]].sender !== currentUser) audio.play().catch(()=>{});
                    }
                }
                isFirstLoad = false;
                box.scrollTop = box.scrollHeight;
                lucide.createIcons();
            });
        }

        function confirmDelete(key) { if(confirm("Hapus pesan ini?")) db.ref(`chats/${key}`).remove(); }

        function handleAction() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()) {
                db.ref('chats').push({ sender: currentUser, content: inp.value, type: 'text', time: getTime(), read: false });
                inp.value = ""; toggleBtn();
            }
        }

        function handleImage(el) {
            const file = el.files[0];
            if(file) {
                const r = new FileReader();
                r.onload = e => db.ref('chats').push({ sender: currentUser, content: e.target.result, type: 'image', time: getTime(), read: false });
                r.readAsDataURL(file);
            }
        }

        function uploadSticker(el) {
            const file = el.files[0];
            if(file) {
                const r = new FileReader();
                r.onload = e => db.ref('custom_stickers').push(e.target.result);
                r.readAsDataURL(file);
            }
        }

        function initStickers() {
            db.ref('custom_stickers').on('value', s => {
                const cont = document.getElementById('sticker-content');
                cont.innerHTML = "";
                const data = s.val();
                if(data) Object.values(data).forEach(url => {
                    const img = document.createElement('img');
                    img.className = "sticker-item"; img.src = url;
                    img.onclick = () => db.ref('chats').push({ sender: currentUser, content: url, type: 'sticker', time: getTime(), read: false });
                    cont.appendChild(img);
                });
            });
        }

        async function startRecording() {
            if(document.getElementById('msg-input').value.trim()) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const r = new FileReader();
                    r.onload = e => db.ref('chats').push({ sender: currentUser, content: e.target.result, type: 'vn', time: getTime(), read: false });
                    r.readAsDataURL(new Blob(audioChunks, { type: 'audio/webm' }));
                };
                mediaRecorder.start();
                document.getElementById('action-btn').style.background = 'red';
            } catch (err) { alert("Mic Error"); }
        }

        function stopRecording() { if(mediaRecorder && mediaRecorder.state === "recording") { mediaRecorder.stop(); document.getElementById('action-btn').style.background = '#008069'; } }
        function toggleBtn() { document.getElementById('btn-icon').setAttribute('data-lucide', document.getElementById('msg-input').value.trim() ? 'send-horizontal' : 'mic'); lucide.createIcons(); }
        function toggleEmoji() { const p = document.getElementById('emoji-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
        function switchTab(t) { 
            document.getElementById('emoji-content').style.display = t === 'emoji' ? 'grid' : 'none';
            document.getElementById('sticker-content').style.display = t === 'sticker' ? 'grid' : 'none';
            document.getElementById('tab-emoji').classList.toggle('tab-active', t === 'emoji');
            document.getElementById('tab-sticker').classList.toggle('tab-active', t === 'sticker');
        }
        function closePanels() { document.getElementById('emoji-panel').style.display = 'none'; document.getElementById('menu-dropdown').style.display = 'none'; }
        function toggleMenu(e) { e.stopPropagation(); const m = document.getElementById('menu-dropdown'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        function zoomPic() { document.getElementById('header-pic').classList.toggle('zoom'); document.getElementById('overlay').style.display = 'block'; }
        function closeZoom() { document.getElementById('header-pic').classList.remove('zoom'); document.getElementById('overlay').style.display = 'none'; }
        function updateProfilePic(el) { if(el.files[0]) { const r = new FileReader(); r.onload = e => db.ref(`profiles/${currentUser}`).update({ pic: e.target.result }); r.readAsDataURL(el.files[0]); } }
        
        function initEmoji() {
            const emojis = ["😊","😂","🤣","❤️","😍","😘","🥰","😇","😋","😛","😜","🤪","🤨","🧐","🤔","🤫","🫠","🫣","🫢","🫡","🤩","🥳","🥵","🥶","🥺","😭","😤","😠","😡","🤬","🤯","😳","🤗","😰","😱","🥱","😴","🤤","🤢","🤮","😎","🤓","🤨","😒","🙄","😬","🤥","😶","😐","😑","🤐","🥴","😵","🙌","👏","👋","👍","👎","👊","🙏","🤝","🔥","✨","💯"];
            emojis.forEach(e => {
                const s = document.createElement('div'); s.className = "emoji-item"; s.innerText = e;
                s.onclick = () => { document.getElementById('msg-input').value += e; toggleBtn(); };
                document.getElementById('emoji-content').appendChild(s);
            });
        }
    </script>
</body>
</html>
