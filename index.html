<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackCust JTM - Driver System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #f0f2f5; margin: 0; overflow-x: hidden; font-family: sans-serif; }
        .header-jtm { background: #005580; padding: 12px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .order-card { background: white; border-radius: 15px; padding: 15px; margin: 10px; border-left: 6px solid #e31837; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-action { padding: 12px; border-radius: 8px; font-weight: bold; font-size: 13px; text-align: center; flex: 1; text-transform: uppercase; }
        .status-badge { background: #ebf5ff; color: #005580; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        #modal-add { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="header-jtm">
        <h1 class="text-white font-black italic text-xl">DOMINO'S <span class="text-red-500">JTM</span></h1>
        <div class="flex items-center gap-2">
            <span id="activeUser" class="bg-white text-[#005580] px-3 py-1 rounded-full text-[10px] font-black">OKTA</span>
            <button onclick="location.reload()" class="bg-red-500 text-white w-8 h-8 rounded-md"><i class="fa fa-sync-alt text-xs"></i></button>
        </div>
    </div>

    <div class="p-3 bg-white border-b">
        <div class="relative mb-2">
            <input type="text" placeholder="Cari Nama/No HP/Driver..." class="w-full bg-gray-100 p-3 rounded-xl text-sm outline-none border border-transparent focus:border-blue-500">
            <i class="fa fa-search absolute right-4 top-4 text-gray-400"></i>
        </div>
        <div class="flex justify-between items-center px-1">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Total Antrean Aktif</p>
            <span id="orderCount" class="bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">78 Pesanan</span>
        </div>
    </div>

    <div id="orderList" class="pb-24">
        <div class="order-card">
            <div class="flex justify-between items-start mb-3">
                <div>
                    <p class="text-[10px] text-red-600 font-extrabold uppercase">Jatirahayu (Cluster Taman Jatirahayu)</p>
                    <h3 class="font-bold text-lg">Samuel Bago</h3>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="text-[11px] text-gray-500 italic">8 Menit lagi</span>
                        <span id="driverStatus-1" class="hidden status-badge animate-pulse">
                            <i class="fa fa-motorcycle mr-1"></i> DIANTAR OLEH: <span class="driver-name">OKTA</span>
                        </span>
                    </div>
                </div>
                <div class="flex gap-1">
                    <button class="w-9 h-9 bg-yellow-400 rounded-lg text-white"><i class="fa fa-check"></i></button>
                    <button onclick="toggleDelivery(1)" class="w-9 h-9 bg-blue-500 rounded-lg text-white shadow-lg active:scale-95 transition-transform">
                        <i class="fa fa-motorcycle"></i>
                    </button>
                </div>
            </div>
            
            <div class="mb-3 hidden" id="housePreview-1">
                <img src="https://via.placeholder.com/300x150?text=Foto+Rumah+Customer" class="w-full h-32 object-cover rounded-lg border">
            </div>

            <div class="flex gap-2">
                <button class="btn-action bg-[#005580] text-white">MAPS</button>
                <button class="btn-action bg-[#25d366] text-white">WA</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-20 right-5">
        <button onclick="openModal()" class="w-14 h-14 bg-[#005580] rounded-full text-white shadow-2xl border-4 border-white flex items-center justify-center">
            <i class="fa fa-plus text-2xl"></i>
        </button>
    </div>

    <div id="modal-add" onclick="if(event.target==this) closeModal()">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h2 class="font-black text-[#005580] mb-4 text-center">TAMBAH CUSTOMER</h2>
            <div class="space-y-3">
                <input type="text" placeholder="Nama Customer" class="w-full p-3 bg-gray-100 rounded-xl outline-none text-sm">
                <input type="text" placeholder="Area / Alamat" class="w-full p-3 bg-gray-100 rounded-xl outline-none text-sm">
                
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center">
                    <label class="cursor-pointer">
                        <i class="fa fa-home text-2xl text-gray-400 mb-2"></i>
                        <p class="text-[10px] text-gray-500">Foto Rumah (Opsional)</p>
                        <input type="file" class="hidden" accept="image/*" onchange="previewFile(this)">
                    </label>
                    <div id="imgPreview" class="hidden mt-2"><img id="targetImg" class="h-20 mx-auto rounded-lg"></div>
                </div>

                <button class="w-full bg-[#005580] text-white py-3 rounded-xl font-bold shadow-lg">SIMPAN DATA</button>
            </div>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('modal-add').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-add').style.display = 'none'; }

        // Fungsi Preview Foto Rumah
        function previewFile(input) {
            const preview = document.getElementById('imgPreview');
            const target = document.getElementById('targetImg');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    target.src = e.target.result;
                    preview.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Fitur Tombol Motor: Munculkan nama Driver di samping Menit
        function toggleDelivery(id) {
            const status = document.getElementById(`driverStatus-${id}`);
            const driverName = document.getElementById('activeUser').innerText;
            
            if(status.classList.contains('hidden')) {
                status.classList.remove('hidden');
                status.querySelector('.driver-name').innerText = driverName;
                alert(`Driver ${driverName} mulai mengantar!`);
            } else {
                status.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
