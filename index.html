<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JTM Love Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .page { display: none; height: 100vh; flex-direction: column; }
        .page.active { display: flex; }
        .msg-bubble { max-width: 80%; padding: 10px 15px; border-radius: 20px; margin-bottom: 8px; font-size: 14px; }
        .msg-left { background: #334155; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-right { background: #db2777; align-self: flex-end; border-bottom-right-radius: 2px; }
        .online-dot { width: 12px; height: 12px; background: #22c55e; border-radius: 50%; border: 2px solid #0f172a; position: absolute; bottom: 0; right: 0; }
        .xoxo-cell { height: 100px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; background: rgba(255,255,255,0.05); border-radius: 15px; }
    </style>
</head>
<body>

    <div id="loginPage" class="flex flex-col items-center justify-center h-screen p-6 text-center">
        <h1 class="text-4xl font-black italic mb-2 tracking-tighter">LOVE <span class="text-pink-500">SPACE</span></h1>
        <div class="grid grid-cols-2 gap-8 w-full max-w-sm mt-10">
            <button onclick="loginAs('Okta')" class="flex flex-col items-center">
                <img src="https://ui-avatars.com/api/?name=Okta&background=0D8ABC&color=fff" class="w-20 h-20 rounded-full border-4 border-blue-500 mb-2">
                <span class="font-black italic uppercase text-xs">Okta</span>
            </button>
            <button onclick="loginAs('Novi')" class="flex flex-col items-center">
                <img src="https://ui-avatars.com/api/?name=Novi&background=db2777&color=fff" class="w-20 h-20 rounded-full border-4 border-pink-500 mb-2">
                <span class="font-black italic uppercase text-xs">Novi</span>
            </button>
        </div>
    </div>

    <div id="mainApp" class="hidden h-screen flex flex-col">
        <header class="p-4 flex justify-between items-center glass">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <img id="partnerAvatar" src="" class="w-10 h-10 rounded-full border-2 border-pink-400">
                    <div id="partnerStatus" class="online-dot hidden"></div>
                </div>
                <div>
                    <h2 id="partnerName" class="font-black italic text-xs uppercase">Partner</h2>
                    <p id="statusText" class="text-[9px] font-bold text-gray-400">OFFLINE</p>
                </div>
            </div>
            <div id="voiceMic" class="w-10 h-10 rounded-full bg-pink-500 flex items-center justify-center shadow-lg active:scale-150 transition-all">
                <i class="fa fa-microphone text-white"></i>
            </div>
        </header>

        <main class="flex-1 overflow-hidden relative">
            <div id="page-chat" class="page active flex flex-col p-4">
                <div id="chatDisplay" class="flex-1 overflow-y-auto flex flex-col gap-2 pb-20"></div>
                <div class="absolute bottom-4 left-4 right-4 flex gap-2">
                    <input type="text" id="chatInput" placeholder="Ketik pesan..." class="flex-1 glass rounded-full px-5 py-3 text-sm outline-none font-bold">
                    <button onclick="sendChat()" class="bg-pink-600 w-12 h-12 rounded-full flex items-center justify-center shadow-lg"><i class="fa fa-paper-plane"></i></button>
                </div>
            </div>

            <div id="page-game" class="page p-6 overflow-y-auto">
                <h2 class="font-black italic text-xl mb-6 text-center">MINI GAMES</h2>
                <div onclick="openXOXO()" class="glass p-6 rounded-[2rem] flex justify-between items-center mb-4">
                    <span class="font-black italic">XOXO (TIC TAC TOE)</span>
                    <i class="fa fa-times text-2xl text-yellow-400"></i>
                </div>
            </div>

            <div id="page-xoxo" class="page p-6">
                <button onclick="showPage('game')" class="mb-4 text-xs font-black uppercase text-pink-400"><i class="fa fa-arrow-left"></i> Kembali</button>
                <p id="statusGame" class="text-center text-xs font-bold mb-4 text-yellow-400 uppercase italic"></p>
                <div class="grid grid-cols-3 gap-3 glass p-4 rounded-[2rem]" id="boardXOXO"></div>
            </div>
        </main>

        <footer class="glass h-16 flex justify-around items-center">
            <button onclick="showPage('chat')" class="flex flex-col items-center gap-1 flex-1 py-2 text-pink-400">
                <i class="fa fa-comments"></i><span class="text-[8px] font-black uppercase italic">Chat</span>
            </button>
            <button onclick="showPage('game')" class="flex flex-col items-center gap-1 flex-1 py-2">
                <i class="fa fa-gamepad"></i><span class="text-[8px] font-black uppercase italic">Game</span>
            </button>
        </footer>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAZ7twf8SbcK-HqniDmVqT6k8IM3ehFtgc", 
            authDomain: "trackcust-jtm.firebaseapp.com", 
            databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "trackcust-jtm" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = ""; let partner = ""; let symbol = "";
        let board = ["","","","","","","","",""]; let myTurn = false;

        function loginAs(name) {
            user = name; partner = name === "Okta" ? "Novi" : "Okta";
            symbol = name === "Okta" ? "X" : "O";
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('partnerName').innerText = partner;
            document.getElementById('partnerAvatar').src = `https://ui-avatars.com/api/?name=${partner}&background=${partner==='Okta'?'0D8ABC':'db2777'}&color=fff`;
            
            db.ref(`couple_status/${user}`).set({ status: 'online' });
            db.ref(`couple_status/${user}`).onDisconnect().set({ status: 'offline' });
            db.ref(`couple_status/${partner}`).on('value', s => {
                const val = s.val();
                const dot = document.getElementById('partnerStatus');
                const txt = document.getElementById('statusText');
                if(val && val.status === 'online') { dot.classList.remove('hidden'); txt.innerText = "ONLINE"; txt.classList.add('text-green-400'); }
                else { dot.classList.add('hidden'); txt.innerText = "OFFLINE"; txt.classList.remove('text-green-400'); }
            });
            startChat();
        }

        function startChat() {
            db.ref('couple_chats').limitToLast(15).on('value', s => {
                const d = document.getElementById('chatDisplay'); d.innerHTML = "";
                s.forEach(c => {
                    const m = c.val();
                    d.innerHTML += `<div class="msg-bubble ${m.sender === user ? 'msg-right' : 'msg-left'}">${m.text}</div>`;
                });
                d.scrollTop = d.scrollHeight;
            });
        }

        function sendChat() {
            const i = document.getElementById('chatInput');
            if(!i.value) return;
            db.ref('couple_chats').push({ sender: user, text: i.value });
            i.value = "";
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
        }

        function openXOXO() {
            showPage('xoxo');
            db.ref('game/xoxo').on('value', s => {
                const d = s.val();
                if(d) { board = d.board; myTurn = d.turn === user; }
                else { board = ["","","","","","","","",""]; myTurn = (user === "Okta"); }
                renderBoard();
            });
        }

        function renderBoard() {
            const c = document.getElementById('boardXOXO'); c.innerHTML = "";
            board.forEach((v, i) => {
                c.innerHTML += `<div onclick="move(${i})" class="xoxo-cell ${v=='X'?'text-blue-400':'text-pink-400'}">${v}</div>`;
            });
            document.getElementById('statusGame').innerText = myTurn ? "Giliranku!" : "Gilirannya...";
        }

        function move(i) {
            if(myTurn && board[i] === "") {
                board[i] = symbol;
                db.ref('game/xoxo').set({ board: board, turn: partner });
                checkWinner();
            }
        }

        function checkWinner() {
            const win = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let p of win) {
                if(board[p[0]] && board[p[0]]==board[p[1]] && board[p[0]]==board[p[2]]) {
                    alert("Yey! " + board[p[0]] + " Menang!");
                    db.ref('game/xoxo').remove();
                    return;
                }
            }
        }
    </script>
</body>
</html>
