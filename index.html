<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="theme-color" content="#075e54">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="manifest" href="manifest.json">
    
    <title>WhatsApp Couple Pro</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --wa-green: #075e54; --wa-light-green: #dcf8c6; --wa-blue: #34b7f1; --bg-chat: #e5ddd5; --wa-dark: #128c7e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; }
        
        /* Login Screen */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-logo { width: 80px; height: 80px; border-radius: 20px; background: url('logo.jpg') center/cover; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .login-title { font-size: 20px; color: #54656f; margin-bottom: 20px; font-weight: bold; }
        .user-list { width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .user-item { padding: 15px; border: 1px solid #ddd; border-radius: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .user-item:active { background: #f0f0f0; transform: scale(0.98); }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: #ccc center/cover; }

        /* Main App Structure */
        #app-interface { display: none; height: 100%; flex-direction: column; background-color: var(--bg-chat); background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }

        /* Header */
        .header { background: var(--wa-green); color: white; padding: 10px 16px; display: flex; align-items: center; gap: 12px; height: 60px; flex-shrink: 0; z-index: 100; cursor: pointer; }
        .profile-pic { width: 40px; height: 40px; border-radius: 50%; background: #ccc center/cover; position: relative; flex-shrink: 0; }
        .online-dot { width: 11px; height: 11px; background: #4df03d; border: 2px solid var(--wa-green); border-radius: 50%; position: absolute; bottom: 0; right: 0; }

        /* Chat Body */
        .chat-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .message { position: relative; max-width: 80%; padding: 8px 12px 22px 12px; margin-bottom: 12px; font-size: 15px; border-radius: 8px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .sent { background: var(--wa-light-green); align-self: flex-end; border-top-right-radius: 0; }
        .msg-meta { position: absolute; right: 8px; bottom: 4px; display: flex; align-items: center; gap: 4px; }
        .time { font-size: 10px; color: #888; }

        /* Emoji & Inputs */
        #emoji-panel { display: none; background: white; height: 200px; overflow-y: auto; padding: 10px; border-top: 1px solid #ddd; grid-template-columns: repeat(8, 1fr); gap: 10px; font-size: 24px; text-align: center; }
        .emoji-item { cursor: pointer; }

        .input-area { background: #f0f0f0; padding: 8px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .input-box { background: white; flex: 1; border-radius: 25px; padding: 5px 12px; display: flex; align-items: center; gap: 8px; }
        input { border: none; flex: 1; padding: 10px 0; outline: none; font-size: 16px; }
        .icon-btn { color: #54656f; cursor: pointer; border: none; background: none; }
        .circle-btn { background: #008069; color: white; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; flex-shrink: 0; }
        
        .recording { background: #ff4b4b !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Overlays */
        #settings-modal, #preview-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 85%; padding: 20px; border-radius: 15px; }
        
        #file-input, #camera-input, #change-profile-input { display: none; }
        audio { height: 35px; width: 200px; }
        img.clickable-img { width: 100%; border-radius: 5px; cursor: pointer; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-logo"></div>
        <div class="login-title">Siapa Anda?</div>
        <div class="user-list">
            <div class="user-item" onclick="loginAs('Okta')">
                <div class="user-avatar" id="login-pic-okta" style="background-color: #075e54; display: flex; align-items: center; justify-content: center; color: white; background-size: cover; background-position: center;">O</div>
                <div style="font-weight: bold; font-size: 18px;">Okta</div>
            </div>
            <div class="user-item" onclick="loginAs('Novi')">
                <div class="user-avatar" id="login-pic-novi" style="background-color: #e11d48; display: flex; align-items: center; justify-content: center; color: white; background-size: cover; background-position: center;">N</div>
                <div style="font-weight: bold; font-size: 18px;">Novi</div>
            </div>
        </div>
        <button onclick="clearHistory()" style="margin-top: 30px; background: none; border: none; color: #ff4b4b; cursor: pointer; font-size: 12px;">Hapus Semua Riwayat</button>
    </div>

    <div id="app-interface">
        <div id="settings-modal">
            <div class="modal-content">
                <h3 id="settings-title">Pengaturan Profil</h3>
                <label style="display: block; margin-bottom: 15px; cursor: pointer; color: #008069; font-weight: bold;">
                    📸 Ganti Foto Saya
                    <input type="file" id="change-profile-input" accept="image/*" onchange="updateMyProfilePic(this)">
                </label>
                <input type="text" id="new-name-input" placeholder="Ganti nama saya..." style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:5px;">
                <button onclick="saveMyProfileSettings()" style="background:#008069; color:white; border:none; padding:10px; border-radius:5px; width:100%; font-weight:bold;">Simpan</button>
            </div>
        </div>

        <div id="preview-overlay" onclick="this.style.display='none'">
            <img id="preview-img" style="max-width:90%; max-height:80%; border-radius:10px;">
        </div>

        <div class="header">
            <div style="display: flex; align-items: center; gap: 12px; flex: 1;" onclick="document.getElementById('settings-modal').style.display='flex'">
                <div class="profile-pic" id="header-pic"><div class="online-dot"></div></div>
                <div class="user-info">
                    <h4 id="header-name">Partner</h4>
                    <span style="font-size: 12px; opacity: 0.9;">Online</span>
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <i data-lucide="rotate-cw" size="20" onclick="location.reload()" style="cursor: pointer;"></i>
                <i data-lucide="log-out" size="20" onclick="location.reload()" style="cursor: pointer;"></i>
            </div>
        </div>

        <div class="chat-container" id="chat-box"></div>
        <div id="emoji-panel"></div>

        <div class="input-area">
            <div class="input-box">
                <button class="icon-btn" onclick="toggleEmoji()"><i data-lucide="smile"></i></button>
                <input type="text" id="msg-input" placeholder="Ketik pesan..." autocomplete="off">
                <label for="file-input" class="icon-btn"><i data-lucide="paperclip"></i></label>
                <input type="file" id="file-input" accept="image/*,video/*" onchange="handleFile(this)">
                <label for="camera-input" class="icon-btn"><i data-lucide="camera"></i></label>
                <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handleFile(this)">
            </div>
            <button class="circle-btn" id="main-btn">
                <i data-lucide="mic" id="btn-icon"></i>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('msg-input');
        const btnIcon = document.getElementById('btn-icon');
        const mainBtn = document.getElementById('main-btn');
        const emojiPanel = document.getElementById('emoji-panel');
        let currentUser = "";

        // --- STORAGE ---
        function saveToLocal(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
        function getFromLocal(key) { const data = localStorage.getItem(key); return data ? JSON.parse(data) : null; }

        // --- LOGIN & PROFILE LOGIC (FIXED) ---
        function loginAs(name) {
            currentUser = name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-interface').style.display = 'flex';
            document.getElementById('settings-title').innerText = `Profil ${currentUser}`;
            loadProfile();
            loadChatHistory();
        }

        function loadProfile() {
            // Tentukan siapa partnernya
            const partner = (currentUser === "Okta") ? "Novi" : "Okta";
            
            // Ambil data partner dari storage
            const partnerName = getFromLocal(`name_${partner}`) || (partner === "Novi" ? "Novi ❤️" : "Okta Firdaus");
            const partnerPic = getFromLocal(`pic_${partner}`);
            
            // Tampilkan data partner di header (karena ini chat dengan partner)
            document.getElementById('header-name').innerText = partnerName;
            if(partnerPic) {
                document.getElementById('header-pic').style.backgroundImage = `url('${partnerPic}')`;
            } else {
                document.getElementById('header-pic').style.backgroundImage = "none";
            }
            
            // Update foto di login screen agar sinkron
            const oktaPic = getFromLocal('pic_Okta');
            const noviPic = getFromLocal('pic_Novi');
            if(oktaPic) document.getElementById('login-pic-okta').style.backgroundImage = `url('${oktaPic}')`;
            if(noviPic) document.getElementById('login-pic-novi').style.backgroundImage = `url('${noviPic}')`;
        }

        // Fungsi mengganti foto diri sendiri
        function updateMyProfilePic(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const picData = e.target.result;
                    // Simpan sebagai foto profil diri sendiri
                    saveToLocal(`pic_${currentUser}`, picData);
                    alert("Foto profil kamu berhasil diubah!");
                    loadProfile(); // Refresh tampilan
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Fungsi mengganti nama diri sendiri
        function saveMyProfileSettings() {
            const newName = document.getElementById('new-name-input').value;
            if(newName.trim() !== "") {
                saveToLocal(`name_${currentUser}`, newName);
                alert("Nama kamu berhasil diubah!");
                loadProfile();
            }
            document.getElementById('settings-modal').style.display = 'none';
        }

        // --- CHAT SYSTEM ---
        function loadChatHistory() {
            chatBox.innerHTML = "";
            const history = getFromLocal('chat_history') || [];
            history.forEach(msg => {
                const bubbleType = (msg.sender === currentUser) ? 'sent' : 'received';
                renderMsg(msg.content, bubbleType, msg.time);
            });
        }

        function addMsg(content, type) {
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const history = getFromLocal('chat_history') || [];
            history.push({ sender: currentUser, content: content, time: time });
            saveToLocal('chat_history', history);
            renderMsg(content, type, time);
        }

        function renderMsg(content, type, time) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `${content}<div class="msg-meta"><span class="time">${time}</span> ${type==='sent'?'<i data-lucide="check-check" size="14" color="#34b7f1"></i>':''}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            lucide.createIcons();
        }

        function clearHistory() {
            if(confirm("Hapus semua riwayat?")) { localStorage.clear(); location.reload(); }
        }

        // --- CONTROLS ---
        input.addEventListener('input', () => {
            btnIcon.setAttribute('data-lucide', input.value.trim() !== "" ? 'send-horizontal' : 'mic');
            lucide.createIcons();
        });

        mainBtn.addEventListener('click', () => {
            if(input.value.trim() !== "") {
                addMsg(input.value, 'sent');
                input.value = "";
                btnIcon.setAttribute('data-lucide', 'mic');
                lucide.createIcons();
                emojiPanel.style.display = 'none';
            }
        });

        function handleFile(inputElement) {
            const file = inputElement.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const content = file.type.startsWith('image') 
                        ? `<img src="${e.target.result}" class="clickable-img" onclick="showFullImg('${e.target.result}')">` 
                        : `<video src="${e.target.result}" controls style="width:100%;"></video>`;
                    addMsg(content, 'sent');
                };
                reader.readAsDataURL(file);
            }
        }

        function showFullImg(src) {
            document.getElementById('preview-img').src = src;
            document.getElementById('preview-overlay').style.display = 'flex';
        }

        const emojis = ["😀","😃","😄","😁","😆","😅","😂","🤣","😊","😇","🙂","🙃","😉","😌","😍","🥰","😘","😗","😙","😚","😋","😛","😝","😜","🤪","🤨","🧐","🤓","😎","🤩","🥳","😏","😒","😞","😔","😟","😕","🙁","☹️","😣","😖","😫","😩","🥺","😢","😭","😤","😠","😡","🤬","🤯","😳","🥵","🥶","😱","😨","😰","😥","😓","🤗","🤔","🤭","🤫","🤥","😶","😐","😑","😬","🙄","😯","😦","😧","😮","😲","🥱","😴","🤤","😪","😵","🤐","🥴","🤢","🤮","🤧","😷","🤒","🤕","🤑","🤠","😈","👿","👹","👺","🤡","💩","👻","💀","☠️","👽","👾","🤖","🎃","😺","😸","😹","😻","😼","😽","🙀","😿","😾","❤️","🧡","💛","💚","💙","💜","🖤","🤍","🤎","💔","❣️","💕","💞","💓","💗","💖","💘","💝","💟"];
        emojis.forEach(e => {
            const span = document.createElement('span');
            span.className = 'emoji-item';
            span.innerText = e;
            span.onclick = () => { input.value += e; input.dispatchEvent(new Event('input')); };
            emojiPanel.appendChild(span);
        });
        function toggleEmoji() { emojiPanel.style.display = emojiPanel.style.display === 'grid' ? 'none' : 'grid'; }

        let mediaRecorder;
        let audioChunks = [];
        async function startRecording() {
            if(input.value.trim() !== "") return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const reader = new FileReader();
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mpeg' });
                    reader.onload = () => addMsg(`<audio controls src="${reader.result}"></audio>`, 'sent');
                    reader.readAsDataURL(audioBlob);
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                mainBtn.classList.add('recording');
            } catch (err) { alert("Izinkan Mic."); }
        }
        function stopRecording() { if (mediaRecorder && mediaRecorder.state === "recording") { mediaRecorder.stop(); mainBtn.classList.remove('recording'); } }

        mainBtn.addEventListener('mousedown', startRecording);
        mainBtn.addEventListener('mouseup', stopRecording);
        mainBtn.addEventListener('touchstart', (e) => { if(input.value.trim()==="") { e.preventDefault(); startRecording(); } });
        mainBtn.addEventListener('touchend', stopRecording);
        input.addEventListener("keypress", (e) => { if(e.key === "Enter") mainBtn.click(); });

        window.onload = function() {
            // Load foto di login screen saat pertama kali buka
            const oktaPic = getFromLocal('pic_Okta');
            const noviPic = getFromLocal('pic_Novi');
            if(oktaPic) document.getElementById('login-pic-okta').style.backgroundImage = `url('${oktaPic}')`;
            if(noviPic) document.getElementById('login-pic-novi').style.backgroundImage = `url('${noviPic}')`;
        };
    </script>
</body>
</html>
