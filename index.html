<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Domino's JTM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; margin: 0; overflow: hidden; }
        .app-wrapper { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        /* Background Doodle Light ala WA */
        #page-chat {
            background-color: #e5ddd5;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
            background-size: 380px;
            overflow-y: auto;
        }

        /* Bubble Chat Kompleks */
        .bubble { max-width: 85%; padding: 10px; border-radius: 12px; margin-bottom: 12px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bubble-in { background: white; align-self: flex-start; }
        .bubble-out { background: #dcf8c6; align-self: flex-end; }
        
        .sender-name { font-size: 11px; font-weight: bold; color: #075e54; margin-bottom: 4px; text-transform: uppercase; }
        .msg-time { font-size: 10px; color: #888; text-align: right; margin-top: 4px; }

        /* Voice Note Style */
        .vn-container { display: flex; align-items: center; gap: 10px; min-width: 200px; padding: 5px 0; }
        .vn-bar { height: 3px; flex: 1; background: #ddd; border-radius: 2px; }

        /* Bottom Nav */
        .bottom-nav { background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #54656f; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: #006699; }
        
        .add-btn { width: 55px; height: 55px; background: #006699; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; margin-top: -30px; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <header id="appHeader" class="hidden bg-[#006699] p-3 flex justify-between items-center shadow-lg">
            <div class="flex items-center">
                <h1 class="text-white font-black italic text-xl tracking-tighter">DOMINO'S <span class="text-red-500">JTM</span></h1>
            </div>
            <div class="flex items-center gap-2">
                <span id="userNameTag" class="bg-white text-[#006699] px-4 py-1 rounded-full text-[11px] font-black uppercase">OKTA</span>
                <button onclick="location.reload()" class="bg-red-500 text-white w-8 h-8 rounded-lg flex items-center justify-center shadow-inner">
                    <i class="fa fa-sync-alt text-xs"></i>
                </button>
            </div>
        </header>

        <div id="loginPage" class="flex flex-col items-center justify-center h-full bg-[#006699]">
             <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center w-[80%]">
                <h2 class="text-[#006699] font-black mb-8 italic">LOGIN CREW JTM</h2>
                <div class="flex gap-8">
                    <button onclick="loginAs('Okta')" class="flex flex-col items-center gap-2">
                        <div class="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center border-2 border-blue-500 text-blue-500 font-bold">O</div>
                        <span class="text-[10px] font-bold">OKTA</span>
                    </button>
                    <button onclick="loginAs('Novi')" class="flex flex-col items-center gap-2">
                        <div class="w-16 h-16 rounded-full bg-pink-100 flex items-center justify-center border-2 border-pink-500 text-pink-500 font-bold">N</div>
                        <span class="text-[10px] font-bold">NOVI</span>
                    </button>
                </div>
             </div>
        </div>

        <main class="flex-1 overflow-hidden relative flex flex-col">
            <div id="page-chat" class="flex-1 flex flex-col p-4">
                <div id="chatDisplay" class="flex flex-col">
                    <div class="bubble bubble-in">
                        <p class="sender-name">DENDY</p>
                        <div class="vn-container">
                            <i class="fa fa-play text-gray-500"></i>
                            <div class="vn-bar"></div>
                        </div>
                        <p class="msg-time">15.37</p>
                    </div>
                </div>
            </div>

            <div class="p-3 flex items-center gap-3 bg-transparent absolute bottom-16 w-full">
                <div class="flex-1 bg-white rounded-full px-4 py-3 flex items-center shadow-md border border-gray-200">
                    <i class="fa fa-microphone text-gray-400 mr-3"></i>
                    <input type="text" id="chatInput" placeholder="Ketik pesan..." class="flex-1 outline-none text-sm text-gray-700 bg-transparent">
                </div>
                <button onclick="sendChat()" class="w-12 h-12 bg-[#005c4b] rounded-full flex items-center justify-center text-white shadow-lg">
                    <i class="fa fa-paper-plane"></i>
                </button>
            </div>

            <nav class="bottom-nav">
                <div class="nav-item">
                    <i class="fa fa-list-ul mb-1"></i>
                    <span>LIST</span>
                </div>
                <div class="nav-item">
                    <i class="fa fa-history mb-1"></i>
                    <span>RIWAYAT</span>
                </div>
                <div class="add-btn">
                    <i class="fa fa-plus text-2xl"></i>
                </div>
                <div class="nav-item active">
                    <i class="fa fa-comments mb-1"></i>
                    <span>CHAT</span>
                </div>
                <div class="nav-item" onclick="location.reload()">
                    <i class="fa fa-sign-out-alt mb-1"></i>
                    <span>LOGOUT</span>
                </div>
            </nav>
        </main>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAZ7twf8SbcK-HqniDmVqT6k8IM3ehFtgc", 
            databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "trackcust-jtm" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = "";

        function loginAs(n) {
            user = n;
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appHeader').classList.remove('hidden');
            document.getElementById('userNameTag').innerText = user;
            startChat();
        }

        function sendChat() {
            const i = document.getElementById('chatInput');
            if(!i.value.trim()) return;
            db.ref('couple_chats').push({
                sender: user,
                text: i.value,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            i.value = "";
        }

        function startChat() {
            db.ref('couple_chats').on('value', s => {
                const d = document.getElementById('chatDisplay');
                d.innerHTML = ""; // Reset for demo
                s.forEach(c => {
                    const m = c.val();
                    const isMe = m.sender === user;
                    d.innerHTML += `
                        <div class="bubble ${isMe ? 'bubble-out' : 'bubble-in'}">
                            <p class="sender-name">${m.sender}</p>
                            <div class="text-sm">${m.text}</div>
                            <p class="msg-time">${m.time} ${isMe ? '<i class="fa fa-check-double text-blue-400"></i>' : ''}</p>
                        </div>
                    `;
                });
                document.getElementById('page-chat').scrollTop = document.getElementById('page-chat').scrollHeight;
            });
        }
    </script>
</body>
</html>
