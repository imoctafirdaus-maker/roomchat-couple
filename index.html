<script>
    // --- TAMBAHAN LOGIKA SUARA PING (TANPA MENGUBAH FITUR LAIN) ---
    
    // Ganti link suara ke yang lebih nyaring (suara Ping WhatsApp asli)
    audio.src = "https://raw.githubusercontent.com/Aris-Agustiyan/whatsapp-clone/master/src/assets/sounds/whatsapp_notification.mp3";

    // Fungsi pancingan agar browser mengizinkan suara setelah login
    function enableAudioOnFirstClick() {
        audio.play().then(() => {
            audio.pause();
            audio.currentTime = 0;
            console.log("Audio siap digunakan");
        }).catch(e => console.log("Menunggu interaksi pengguna..."));
        document.body.removeAttribute('onclick');
    }

    // Modifikasi bagian startApp khusus untuk bunyi
    const originalStartApp = startApp;
    startApp = function() {
        originalStartApp(); // Jalankan fungsi asli kamu
        
        // Pasang pendengar pesan baru untuk bunyi
        db.ref('chats').limitToLast(1).on('child_added', s => {
            const msg = s.val();
            // Jika pesan dari partner DAN bukan saat loading pertama kali
            if (!isFirstLoad && msg.sender !== currentUser) {
                audio.currentTime = 0;
                audio.play().catch(e => {
                    // Jika gagal bunyi otomatis, kita coba pancing lagi saat ada klik di layar
                    console.log("Mencoba membunyikan ping...");
                });
            }
        });
    };

    // Tambahkan tombol kecil di header jika suara masih terhambat browser
    window.addEventListener('DOMContentLoaded', () => {
        const header = document.querySelector('.header');
        const soundBtn = document.createElement('i');
        soundBtn.setAttribute('data-lucide', 'volume-2');
        soundBtn.style.cssText = "cursor:pointer; width:20px; margin-right:10px; color:rgba(255,255,255,0.7)";
        soundBtn.onclick = () => {
            audio.play(); 
            alert("Suara Ping Aktif!");
        };
        header.insertBefore(soundBtn, header.lastChild);
    });
</script>
