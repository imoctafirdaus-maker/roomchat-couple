<script>
    // --- KONFIGURASI FIREBASE ---
    const firebaseConfig = {
      apiKey: "AIzaSyAH7DAAnW10vhlf9Fb4FNS--Djq67KUTA0",
      authDomain: "couple-chat-okta-dan-novi.firebaseapp.com",
      databaseURL: "https://couple-chat-okta-dan-novi-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "couple-chat-okta-dan-novi",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = "";
    let isFirstLoad = true;
    const audio = document.getElementById('notif-sound');

    // Suara Ping WhatsApp
    audio.src = "https://raw.githubusercontent.com/Aris-Agustiyan/whatsapp-clone/master/src/assets/sounds/whatsapp_notification.mp3";

    function enableAudioOnFirstClick() {
        audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});
        document.body.removeAttribute('onclick');
    }

    function loginAs(name) {
        const pin = prompt(`PIN ${name}:`);
        const pins = { 'Okta': '14102000', 'Novi': '14112001' };
        if (pin === pins[name]) {
            currentUser = name;
            localStorage.setItem('logged_user', name);
            enableAudioOnFirstClick();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-interface').style.display = 'flex';
            startApp();
        } else { alert("Salah!"); }
    }

    function startApp() {
        lucide.createIcons();
        db.ref(`profiles/${currentUser}`).update({ status: "Online" });
        db.ref(`profiles/${currentUser}`).onDisconnect().update({ status: "Offline", lastSeen: new Date().toLocaleTimeString() });

        const partner = currentUser === "Okta" ? "Novi" : "Okta";
        db.ref(`profiles/${partner}`).on('value', s => {
            const d = s.val() || {};
            document.getElementById('header-name').innerText = d.name || partner;
            document.getElementById('header-status').innerText = d.status === "Online" ? "Online" : "Offline";
        });

        // Sync Chat & Ping
        db.ref('chats').on('value', s => {
            const box = document.getElementById('chat-box');
            const data = s.val();
            if(data) {
                box.innerHTML = "";
                const keys = Object.keys(data);
                const lastMsg = data[keys[keys.length - 1]];
                
                Object.values(data).forEach(m => renderMsg(m));
                
                if (!isFirstLoad && lastMsg.sender !== currentUser) {
                    audio.currentTime = 0;
                    audio.play().catch(e => console.log("Audio block"));
                }
            }
            isFirstLoad = false;
            box.scrollTop = box.scrollHeight;
        });
    }

    // FUNGSI UTAMA PERBAIKAN TAMPILAN
    function renderMsg(msg) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `message ${msg.sender === currentUser ? 'sent' : 'received'}`;
        
        let contentHTML = "";

        // Logika Deteksi Konten: Gambar, Video, atau Teks
        if (msg.content.includes("data:image") || msg.content.includes("<img")) {
            // Jika konten adalah base64 gambar atau tag img
            const src = msg.content.includes("src=\"") ? msg.content.split('src="')[1].split('"')[0] : msg.content;
            contentHTML = `<img src="${src}" style="width:100%; border-radius:10px; display:block;">`;
        } 
        else if (msg.content.includes("data:video") || msg.content.includes("<video")) {
            // Jika konten adalah base64 video atau tag video
            const src = msg.content.includes("src=\"") ? msg.content.split('src="')[1].split('"')[0] : msg.content;
            contentHTML = `<video src="${src}" controls style="width:100%; border-radius:10px; display:block;"></video>`;
        } 
        else {
            // Jika teks biasa
            contentHTML = `<span>${msg.content}</span>`;
        }

        div.innerHTML = `${contentHTML}<div class="msg-meta"><span class="time">${msg.time}</span></div>`;
        box.appendChild(div);
    }

    document.getElementById('main-btn').onclick = () => {
        const inp = document.getElementById('msg-input');
        if (inp.value.trim()) {
            db.ref('chats').push({
                sender: currentUser,
                content: inp.value,
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                timestamp: Date.now()
            });
            inp.value = "";
        }
    };

    function handleFile(el) {
        const file = el.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                db.ref('chats').push({
                    sender: currentUser,
                    content: e.target.result, // Simpan data murni, renderMsg yang akan mengolahnya
                    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                    timestamp: Date.now()
                });
            };
            reader.readAsDataURL(file);
        }
    }

    window.onload = () => {
        const saved = localStorage.getItem('logged_user');
        if (saved) { 
            currentUser = saved; 
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-interface').style.display = 'flex';
            startApp();
        }
    };
</script>
