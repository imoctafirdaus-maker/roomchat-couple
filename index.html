<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Couple - Aktif</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --wa-green: #075e54;
            --wa-light-green: #dcf8c6;
            --wa-blue: #34b7f1;
            --bg-chat: #e5ddd5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        /* Memastikan body memenuhi layar penuh tanpa scroll body */
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed; /* Mencegah bouncing di iOS/Android */
        }

        body {
            background-color: var(--bg-chat);
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            display: flex;
            flex-direction: column;
        }

        /* Header Tetap di Atas */
        .header {
            background-color: var(--wa-green);
            color: white;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            height: 60px;
            flex-shrink: 0;
            z-index: 100;
        }

        .profile-pic {
            width: 40px; height: 40px;
            border-radius: 50%;
            background-image: url('logo.jpg');
            background-size: cover;
            background-position: center;
            background-color: #ccc;
            position: relative;
        }
        
        .online-dot {
            width: 11px; height: 11px;
            background-color: #4df03d;
            border: 2px solid var(--wa-green);
            border-radius: 50%;
            position: absolute;
            bottom: 0; right: 0;
        }

        /* Chat Container yang Bisa Di-scroll */
        .chat-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch; /* Scroll halus di HP */
        }

        .message {
            position: relative;
            max-width: 80%;
            padding: 8px 12px 22px 12px;
            margin-bottom: 12px;
            font-size: 15px;
            border-radius: 8px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        .received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .sent { background: var(--wa-light-green); align-self: flex-end; border-top-right-radius: 0; }

        .msg-meta { position: absolute; right: 8px; bottom: 4px; display: flex; align-items: center; gap: 4px; }
        .time { font-size: 10px; color: #888; }

        /* Input Area Tetap di Bawah */
        .input-area {
            background: transparent;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            margin-bottom: 5px;
        }

        .input-box {
            background: white;
            flex: 1;
            border-radius: 25px;
            padding: 5px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input {
            border: none; flex: 1;
            padding: 10px 0; outline: none;
            font-size: 16px; /* Font size 16px mencegah auto-zoom di iPhone */
        }
        
        .icon-btn { color: #54656f; cursor: pointer; border: none; background: none; }

        .circle-btn {
            background: #008069; color: white;
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: none; flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile-pic">
            <div class="online-dot"></div>
        </div>
        <div class="user-info">
            <h4 style="font-size: 16px;">Novi ❤️</h4>
            <span style="font-size: 12px; opacity: 0.9;">Online</span>
        </div>
    </div>

    <div class="chat-container" id="chat-box">
        <div class="message received">
            Sekarang tampilannya sudah diperbaiki, Okta! Kolom chat harusnya sudah terlihat jelas.
            <div class="msg-meta"><span class="time">14:35</span></div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <button class="icon-btn" onclick="addMsg('🎉', 'sent')"><i data-lucide="smile"></i></button>
            <input type="text" id="msg-input" placeholder="Ketik pesan..." autocomplete="off">
            <button class="icon-btn"><i data-lucide="paperclip"></i></button>
            <button class="icon-btn" onclick="addMsg('📷 Mengirim Gambar...', 'sent')"><i data-lucide="camera"></i></button>
        </div>
        
        <button class="circle-btn" id="main-btn" onclick="handleSend()">
            <i data-lucide="mic" id="btn-icon"></i>
        </button>
    </div>

    <script>
        lucide.createIcons();
        const input = document.getElementById('msg-input');
        const chatBox = document.getElementById('chat-box');
        const btnIcon = document.getElementById('btn-icon');

        input.addEventListener('input', () => {
            if(input.value.trim() !== "") {
                btnIcon.setAttribute('data-lucide', 'send-horizontal');
            } else {
                btnIcon.setAttribute('data-lucide', 'mic');
            }
            lucide.createIcons();
        });

        function handleSend() {
            const text = input.value.trim();
            if (text !== "") {
                addMsg(text, 'sent');
                input.value = "";
                btnIcon.setAttribute('data-lucide', 'mic');
                lucide.createIcons();
            }
        }

        function addMsg(text, type) {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = `${text}<div class="msg-meta"><span class="time">${timeStr}</span> ${type==='sent'?'<i data-lucide="check-check" size="14" color="#34b7f1"></i>':''}</div>`;
            chatBox.appendChild(msgDiv);
            lucide.createIcons();
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        input.addEventListener("keypress", (e) => { if(e.key === "Enter") handleSend(); });
    </script>
</body>
</html>
