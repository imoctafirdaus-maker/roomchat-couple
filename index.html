<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Couple Pro</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --wa-green: #075e54; --wa-light-green: #dcf8c6; --wa-blue: #34b7f1; --bg-chat: #e5ddd5; --wa-dark: #128c7e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; }
        
        /* Login Screen */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-logo { color: #25d366; margin-bottom: 30px; }
        .login-title { font-size: 20px; color: #54656f; margin-bottom: 20px; font-weight: bold; }
        .user-list { width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .user-item { padding: 15px; border: 1px solid #ddd; border-radius: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .user-item:active { background: #f0f0f0; transform: scale(0.98); }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: #ccc center/cover; }

        /* Main App Structure */
        #app-interface { display: none; height: 100%; flex-direction: column; background-color: var(--bg-chat); background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }

        /* Header & Components */
        .header { background: var(--wa-green); color: white; padding: 10px 16px; display: flex; align-items: center; gap: 12px; height: 60px; flex-shrink: 0; z-index: 100; cursor: pointer; }
        .profile-pic { width: 40px; height: 40px; border-radius: 50%; background: url('logo.jpg') center/cover, #ccc; position: relative; flex-shrink: 0; }
        .online-dot { width: 11px; height: 11px; background: #4df03d; border: 2px solid var(--wa-green); border-radius: 50%; position: absolute; bottom: 0; right: 0; }

        .chat-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .message { position: relative; max-width: 80%; padding: 8px 12px 22px 12px; margin-bottom: 12px; font-size: 15px; border-radius: 8px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .sent { background: var(--wa-light-green); align-self: flex-end; border-top-right-radius: 0; }
        .msg-meta { position: absolute; right: 8px; bottom: 4px; display: flex; align-items: center; gap: 4px; }
        .time { font-size: 10px; color: #888; }

        /* Input Area */
        .input-area { background: #f0f0f0; padding: 8px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .input-box { background: white; flex: 1; border-radius: 25px; padding: 5px 12px; display: flex; align-items: center; gap: 8px; }
        input { border: none; flex: 1; padding: 10px 0; outline: none; font-size: 16px; }
        .circle-btn { background: #008069; color: white; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; flex-shrink: 0; }
        .recording { background: #ff4b4b !important; animation: pulse 1s infinite; }
        
        #settings-modal, #preview-overlay, #emoji-panel { display: none; }
        #settings-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 85%; padding: 20px; border-radius: 15px; }
        
        #file-input, #change-profile-input { display: none; }
        audio { height: 35px; width: 200px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-logo"><i data-lucide="message-square" size="60"></i></div>
        <div class="login-title">Siapa Anda?</div>
        <div class="user-list">
            <div class="user-item" onclick="loginAs('Okta')">
                <div class="user-avatar" style="background-image: url('logo.jpg')"></div>
                <div style="font-weight: bold; font-size: 18px;">Okta</div>
            </div>
            <div class="user-item" onclick="loginAs('Novi')">
                <div class="user-avatar" style="background-color: #e11d48; display: flex; align-items: center; justify-content: center; color: white;">N</div>
                <div style="font-weight: bold; font-size: 18px;">Novi</div>
            </div>
        </div>
    </div>

    <div id="app-interface">
        <div id="settings-modal">
            <div class="modal-content">
                <h3>Pengaturan Profil</h3>
                <label style="display: block; margin-bottom: 10px; cursor: pointer; color: #008069;">
                    📸 Ganti Foto Profil
                    <input type="file" id="change-profile-input" accept="image/*" onchange="updateProfilePic(this)">
                </label>
                <input type="text" id="new-name-input" placeholder="Nama baru..." style="width:100%; padding:8px; margin-bottom:10px;">
                <button onclick="saveProfileSettings()" style="background:#008069; color:white; border:none; padding:10px; border-radius:5px; width:100%;">Simpan</button>
            </div>
        </div>

        <div class="header" onclick="document.getElementById('settings-modal').style.display='flex'">
            <div class="profile-pic" id="header-pic"><div class="online-dot"></div></div>
            <div class="user-info">
                <h4 id="header-name">Partner</h4>
                <span style="font-size: 12px; opacity: 0.9;">Online</span>
            </div>
        </div>

        <div class="chat-container" id="chat-box"></div>

        <div class="input-area">
            <div class="input-box">
                <button class="icon-btn" style="background:none; border:none;"><i data-lucide="smile"></i></button>
                <input type="text" id="msg-input" placeholder="Ketik pesan..." autocomplete="off">
                <label for="file-input" style="cursor:pointer;"><i data-lucide="paperclip"></i></label>
                <input type="file" id="file-input" accept="image/*" onchange="handleFile(this)">
            </div>
            <button class="circle-btn" id="main-btn">
                <i data-lucide="mic" id="btn-icon"></i>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('msg-input');
        const btnIcon = document.getElementById('btn-icon');
        const mainBtn = document.getElementById('main-btn');
        let currentUser = "";

        // FUNGSI LOGIN
        function loginAs(name) {
            currentUser = name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-interface').style.display = 'flex';
            
            // Set Partner name di header
            const partnerName = (name === "Okta") ? "Novi ❤️" : "Okta Firdaus";
            document.getElementById('header-name').innerText = partnerName;
            
            addMsg(`Selamat datang, <b>${name}</b>! Silahkan mulai chat.`, 'received');
        }

        // FUNGSI PESAN & MEDIA (Tetap dipertahankan)
        function addMsg(content, type) {
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `${content}<div class="msg-meta"><span class="time">${time}</span> ${type==='sent'?'<i data-lucide="check-check" size="14" color="#34b7f1"></i>':''}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            lucide.createIcons();
        }

        input.addEventListener('input', () => {
            btnIcon.setAttribute('data-lucide', input.value.trim() !== "" ? 'send-horizontal' : 'mic');
            lucide.createIcons();
        });

        mainBtn.onclick = () => { 
            if(input.value.trim() !== "") { 
                addMsg(input.value, 'sent'); 
                input.value = ""; 
                btnIcon.setAttribute('data-lucide', 'mic'); 
                lucide.createIcons(); 
            } 
        };

        // VOICE NOTE REAL (MediaRecorder)
        let mediaRecorder;
        let audioChunks = [];

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mpeg' });
                    addMsg(`<audio controls src="${URL.createObjectURL(audioBlob)}"></audio>`, 'sent');
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                mainBtn.classList.add('recording');
            } catch (err) { alert("Izinkan Mic di browser."); }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                mainBtn.classList.remove('recording');
            }
        }

        mainBtn.addEventListener('mousedown', () => { if(input.value.trim()==="") startRecording(); });
        mainBtn.addEventListener('mouseup', stopRecording);
        mainBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if(input.value.trim()==="") startRecording(); });
        mainBtn.addEventListener('touchend', stopRecording);

        function handleFile(input) {
            const reader = new FileReader();
            reader.onload = (e) => addMsg(`<img src="${e.target.result}" style="width:100%; border-radius:5px;">`, 'sent');
            reader.readAsDataURL(input.files[0]);
        }
        
        input.addEventListener("keypress", (e) => { if(e.key === "Enter") mainBtn.onclick(); });
    </script>
</body>
</html>
